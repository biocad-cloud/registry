<!DOCTYPE html>

<html lang="en">

<head>
  ${./includes/head.html}
</head>

<body class="index-page scrolled">
  ${./includes/nav.html}

  <br />
  <br />
  <br />
  <br />

  <main class="main">

    <section id="data" class="section">

      <!-- Section Title -->
      <div class="container section-title">
        <h2>{$title}</h2>
        <p>Necessitatibus eius consequatur ex aliquid fuga eum quidem sint consectetur velit</p>
      </div><!-- End Section Title -->

      <div class="container">

        ${./includes/paging.html}

        <br />

        <ul>
          <foreach @item>
            <li>
              <a href='@item["url"]'>@item["name"]</a> <span class='badge rounded-pill text-bg-@item["bs_color"]'><a
                  href="#" style="color: white; text-decoration: none;">@item["type"]</a></span><br />
              <blockquote>@item["note"]</blockquote>
            </li>
          </foreach>
        </ul>

        ${./includes/paging.html}

      </div>

    </section>


  </main>

  ${./includes/footer.html}
</body>

</html>
